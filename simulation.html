<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Swarm - Simulation Setup</title>

    <style>
        :root {
            --sidebar-bg: #111111;
            --sidebar-text: #aaaaaa;
            --sidebar-hover: #ffffff;
            --sidebar-active: #388e3c;
            --content-bg: #ffffff;
            --text-color: #333333;
            --header-bg: #0d233a;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: var(--content-bg);
            color: var(--text-color);
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .logo-container {
            padding: 0 20px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo-placeholder {
            background: white;
            color: black;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .menu-section {
            padding: 15px 20px 5px;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            padding: 10px 20px;
            color: var(--sidebar-text);
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
            background-color: #1a1a1a;
        }

        .sidebar a.active {
            color: white;
            background-color: #1e1e1e;
            border-left: 4px solid var(--sidebar-active);
            font-weight: bold;
        }

        .main-container {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        .top-header {
            background-color: var(--header-bg);
            color: white;
            padding: 25px 40px;
        }

        .top-header h1 {
            margin: 0;
        }

        .content-body {
            padding: 40px;
        }

        @media screen and (max-width: 768px) {
            body {
                display: block;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-container {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-placeholder">DRONE SWARM</div>
        </div>

        <div class="menu-section">Navigation</div>

        <a href="about.html">About Us</a>
        <a href="ProDro.html">Drone Statics</a>
        <a href="simulation.html" class="active">Simulation Setup</a>
    </div>

    <!-- Main Workspace -->
    <div class="main-container">

        <div class="top-header">
            <h1>Simulation Setup</h1>
        </div>

        <div class="content-body">
            <!-- Blank page -->
        </div>

    </div>

</body>
</html>
