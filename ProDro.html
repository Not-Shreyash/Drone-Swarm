<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Swarm Documentation</title>
    <style>
        :root {
            --sidebar-bg: #111111;
            --sidebar-text: #aaaaaa;
            --sidebar-hover: #ffffff;
            --sidebar-active: #388e3c;
            --content-bg: #ffffff;
            --text-color: #333333;
            --header-bg: #0d233a;
            --border-color: #dddddd;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            background-color: var(--content-bg);
            color: var(--text-color);
        }

        /* Sidebar Layout */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            box-sizing: border-box;
            padding: 20px 0;
            border-right: 1px solid #222;
        }

        .logo-container {
            padding: 0 20px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo-placeholder {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            color: #000;
            display: inline-block;
            letter-spacing: 1px;
        }

        .menu-section {
            padding: 15px 20px 5px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            padding: 10px 20px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            color: var(--sidebar-hover);
            background-color: #1a1a1a;
        }

        .sidebar a.active {
            color: #fff;
            background-color: #1e1e1e;
            border-left: 4px solid var(--sidebar-active);
            font-weight: bold;
        }

        /* Main Body Content */
        .main-container {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            background-color: var(--header-bg);
            color: white;
            padding: 25px 40px;
        }

        .top-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .top-header p {
            margin: 5px 0 0 0;
            color: #a0b2c6;
            font-size: 0.95rem;
        }

        .content-body {
            padding: 40px;
            max-width: 900px;
            line-height: 1.6;
        }

        h2 {
            color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
    </style>
    <!-- MathJax for rendering math equations later -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-placeholder">DRONE SWARM</div>
        </div>
        
        <div class="menu-section">Navigation</div>
        <a href="about.html">About Us</a>
        <a href="ProDro.html" class="active">Drone Statics</a>
    </div>

    <!-- Main Workspace -->
    <div class="main-container">
        <div class="top-header">
            <h1>Drone Statics</h1>
            
        </div>

        <div class="content-body" id="drone-statics">
            
            

        </div>
    </div>

</body>
</html>
