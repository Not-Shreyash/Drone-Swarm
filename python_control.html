<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Swarm - Multi Agent System</title>

    <style>
        :root {
            --sidebar-bg: #111111;
            --sidebar-text: #aaaaaa;
            --sidebar-hover: #ffffff;
            --sidebar-active: #388e3c;
            --content-bg: #ffffff;
            --text-color: #333333;
            --header-bg: #0d233a;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: var(--content-bg);
            color: var(--text-color);
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .logo-container {
            padding: 0 20px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo-placeholder {
            background: white;
            color: black;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .menu-section {
            padding: 15px 20px 5px;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            padding: 10px 20px;
            color: var(--sidebar-text);
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
            background-color: #1a1a1a;
        }

        .sidebar a.active {
            color: white;
            background-color: #1e1e1e;
            border-left: 4px solid var(--sidebar-active);
            font-weight: bold;
        }

        .main-container {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        .top-header {
            background-color: var(--header-bg);
            color: white;
            padding: 25px 40px;
        }

        .top-header h1 {
            margin: 0;
        }

        .content-body {
            padding: 40px;
            max-width: 900px;
        }

        /* Documentation & Content Element Styling */
        .content-body h2 {
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 30px;
            color: #24292e;
        }

        .content-body h3 {
            margin-top: 24px;
            color: #24292e;
        }

        .content-body p,
        .content-body ul,
        .content-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .content-body ul {
            padding-left: 2em;
        }

        .content-body li {
            margin-bottom: 4px;
        }

        .command-container {
            position: relative;
            background-color: #000000;
            border-radius: 6px;
            margin-bottom: 16px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .command-container pre {
            margin: 0;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            width: 100%;
        }

        .command-container code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            color: #f0f6fc;
            font-size: 14px;
        }

        .copy-btn {
            background-color: #30363d;
            color: #c9d1d9;
            border: 1px solid #f0f6fc26;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 12px;
            transition: background 0.2s, border-color 0.2s;
        }

        .copy-btn:hover {
            background-color: #8b949e;
            color: #101214;
        }

        .explanation-box {
            background-color: #f6f8fa;
            border-left: 0.25em solid #0366d6;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 0 6px 6px 0;
        }

        .explanation-box p {
            margin: 0;
            font-weight: 600;
            font-size: 14px;
            color: #586069;
        }

        .explanation-box ul {
            margin: 8px 0 0 0;
            padding-left: 20px;
            font-size: 14px;
        }

        table {
            border-spacing: 0;
            border-collapse: collapse;
            width: 100%;
            margin-top: 0;
            margin-bottom: 16px;
        }

        table th,
        table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }

        table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        .architecture-box {
            background-color: #f6f8fa;
            padding: 18px;
            border-radius: 6px;
            border: 1px solid #e1e4e8;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #24292e;
            margin-bottom: 16px;
        }

        .workflow {
            background-color: #f6f8fa;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e1e4e8;
            font-family: monospace;
            text-align: center;
            line-height: 1.8;
        }

        @media screen and (max-width: 768px) {
            body {
                display: block;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-container {
                margin-left: 0;
                width: 100%;
            }
        }

        .setup-image {
            width: 100%;
            max-width: 900px;
            display: block;
            margin: 25px auto;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .image-caption {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            }

        .video-container {
            text-align: center;
            margin: 40px 0;
        }

        .sim-video {
            width: 100%;
            max-width: 900px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-placeholder">DRONE SWARM</div>
        </div>

        <div class="menu-section">Navigation</div>

        <a href="about.html">About Us</a>
        <a href="ProDro.html">Drone Statics</a>
        <a href="simulation.html">Simulation Setup</a>
        <a href="single_agent.html">Single-Drone System</a>
        <a href="python_control.html" class="active">Python-Based Drone Control</a>
        <a href="multi_agent.html">Multi-Drone System</a>
    </div>

    <div class="main-container">

        <div class="top-header">
            <h1>Python-Based Drone Control</h1>
        </div>

        <div class="content-body">

        </div> <script>
        function copyCode(id, button) {
            const codeElement = document.getElementById(id);
            const textToCopy = codeElement.innerText || codeElement.textContent;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = button.innerText;
                button.innerText = 'Copied!';
                button.style.backgroundColor = '#28a745';
                button.style.borderColor = '#28a745';
                button.style.color = '#ffffff';
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.style.backgroundColor = '#30363d';
                    button.style.borderColor = '#f0f6fc26';
                    button.style.color = '#c9d1d9';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>

</body>
</html>
